<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DJP | Développeur Web Abidjan | Portfolio</title>
  <meta name="description" content="Portfolio de DJP, développeur web à Abidjan. HTML, CSS, JavaScript. Projets, compétences et contact.">
  <link rel="icon" type="image/png" href="/favicon.png">
  
  <style>
    /* 1. VARIABLES DE COULEURS EN MODE CLAIR / SOMBRE */
    :root {
      --bg-gradient: linear-gradient(135deg, #ff7e5f, #2a9d8f);
      --card-bg: rgba(255,255,255,0.15);
      --text-color: #ffffff;
      --input-bg: rgba(255, 255, 255, 0.2);
      --accent-color: #25D366;
    }

    .dark-mode {
      --bg-gradient: linear-gradient(135deg, #0f172a, #1e293b);
      --card-bg: rgba(255, 255, 255, 0.05);
      --text-color: #f8fafc;
      --input-bg: rgba(0, 0, 0, 0.3);
    }

    /* 2. REINITIALISATION ET STYLES GENERAUX */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      font-family: 'Segoe UI', Arial, sans-serif;
      color: var(--text-color);
      text-align: center;
      padding: 40px 20px;
      min-height: 100vh;
      transition: all 0.3s ease;
    }

    /* 3. SECTION PRESENTATION PRINCIPALE (HERO) */
    .hero-container {
      max-width: 650px;
      margin: 0 auto;
    }

    h1 {
      font-size: clamp(28px, 6vw, 44px);
      font-weight: 800;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    h2 {
      font-size: clamp(18px, 4vw, 24px);
      font-weight: 600;
      opacity: 0.9;
      margin-bottom: 20px;
    }

    .hero-desc {
      font-size: clamp(15px, 3.5vw, 17px);
      line-height: 1.6;
      opacity: 0.85;
      margin-bottom: 30px;
    }

    .profile-img {
      border: 4px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.25);
      width: 170px;
      height: 170px;
      object-fit: cover;
      margin-bottom: 25px;
      transition: transform 0.3s ease;
    }
    
    .profile-img:hover {
      transform: scale(1.03);
    }

    .btn-whatsapp {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent-color);
      color: white;
      padding: 14px 28px;
      border-radius: 50px;
      text-decoration: none;
      font-weight: 700;
      font-size: 15px;
      box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
      transition: all 0.3s ease;
      margin-bottom: 35px;
    }

    .btn-whatsapp:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
    }

    .points-forts {
      display: flex;
      justify-content: center;
      gap: 12px;
      margin-bottom: 50px;
      flex-wrap: wrap;
    }

    .point {
      font-size: 14px;
      font-weight: 600;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .theme-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: var(--card-bg);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      width: 45px;
      height: 45px;
      font-size: 20px;
      cursor: pointer;
      backdrop-filter: blur(10px);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
<body>

  <button class="theme-toggle" id="themeToggle">🌙</button>

  <div class="hero-container">
    <h1>Jean-Yves Djiguemde</h1>
    <h2>Développeur Web & Mobile</h2>
    <p class="hero-desc">
      Passionné par l'univers de la tech, je conçois des solutions digitales modernes, rapides et entièrement adaptées à tous vos écrans.
    </p>

    <img src="moi.jpg" alt="Jean-Yves Djiguemde - Développeur Web" class="profile-img">
    <br>
    <a href="https://wa.me" class="btn-whatsapp" target="_blank">
      Contactez-moi sur WhatsApp
    </a>

    <div class="points-forts">
      <div class="point">⚡ Rapide</div>
      <div class="point">📱 Responsive</div>
      <div class="point">🚀 Moderne</div>
    </div>
  </div>

  <section style="margin-top: 20px; padding: 30px 25px; background: var(--card-bg); border-radius: 15px; max-width: 600px; margin-left: auto; margin-right: auto; text-align: left; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);">
    <h2 style="margin-bottom: 15px; font-weight: 700;">Qui suis-je ?</h2>
    <p style="font-size: 15px; line-height: 1.7; margin-bottom: 0;">
      Bonjour ! Je m'appelle <strong>Jean-Yves Djiguemde</strong>. Actuellement étudiant en 1ère année IDA à l'<strong>IFSM ANGRÉ (Abidjan)</strong>, je me forme de manière intensive sur les technologies clés du web : HTML, CSS et JavaScript. <br><br>
      Mon objectif est simple : transformer vos concepts et vos idées en interfaces dynamiques, fluides et mémorables. Curieux et rigoureux, je suis toujours prêt à relever de nouveaux défis techniques. Créons ensemble votre projet !
    </p>
  </section>

  <section class="todo-section">
    <h2>Ma To-Do List</h2>
    <p class="todo-subtitle">Suivez l'avancement de vos tâches quotidiennes en temps réel.</p>

    <div class="stats-container">
      <div class="stats-texte">Progression des tâches</div>
      <div class="progress-bar-bg">
        <div class="progress-bar-fill" id="barreProgression"></div>
      </div>
    </div>

    <div class="filtres-container">
      <button class="btn-filtre actif" data-filtre="toutes">Toutes</button>
      <button class="btn-filtre" data-filtre="perso">Perso</button>
      <button class="btn-filtre" data-filtre="boulot">Boulot</button>
      <button class="btn-filtre" data-filtre="ifsm">IFSM</button>
    </div>

    <div class="input-section">
      <input type="text" id="champTache" placeholder="Ajouter une nouvelle tâche...">
      <select id="categorieTache">
        <option value="perso">Perso</option>
        <option value="boulot">Boulot</option>
        <option value="ifsm">IFSM</option>
      </select>
      <input type="date" id="dateTache">
      <button class="btn-todo btn-ajouter" id="btnAjouter">Ajouter</button>
    </div>

    <ul id="listeTaches"></ul>

    <div class="actions-bottom">
      <button class="btn-todo" id="toutSupprimer">Tout effacer</button>
      <button class="btn-todo" id="btnExporter">Exporter JSON</button>
    </div>
  </section>

  <section class="projets-section">
    <h2>Mes Réalisations</h2>
    <p class="projets-subtitle">Découvrez les applications et outils web que je développe au cours de ma formation.</p>

    <div class="projets-grid">
      <div class="projet-card">
        <div>
          <div class="projet-title">📝 Application To-Do List</div>
          <p class="projet-desc">
            Une application de gestion des tâches quotidienne intégrant des filtres par catégorie, une barre de progression en temps réel et une sauvegarde automatique.
          </p>
          <div class="projet-techs">
            <span class="tech-tag">HTML5</span>
            <span class="tech-tag">CSS3</span>
            <span class="tech-tag">JavaScript</span>
            <span class="tech-tag">LocalStorage</span>
          </div>
        </div>
        <a href="#" class="projet-link">Projet Actuel</a>
      </div>

      <div class="projet-card">
        <div>
          <div class="projet-title">🚀 Prochain Projet Pro</div>
          <p class="projet-desc">
            Une future application web dynamique ou un projet d'étude en cours de conception pour valider mes compétences en intégration et développement.
          </p>
          <div class="projet-techs">
            <span class="tech-tag">En cours...</span>
          </div>
        </div>
        <a href="#" class="projet-link" style="opacity: 0.5; pointer-events: none;">Bientôt disponible</a>
      </div>
    </div>
  </section>
  <script>
    const themeToggle = document.getElementById('themeToggle');
    themeToggle.addEventListener('click', () => {
      document.body.classList.toggle('dark-mode');
      themeToggle.textContent = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
    });

    const champTache = document.getElementById('champTache');
    const categorieTache = document.getElementById('categorieTache');
    const dateTache = document.getElementById('dateTache');
    const btnAjouter = document.getElementById('btnAjouter');
    const listeTaches = document.getElementById('listeTaches');
    const barreProgression = document.getElementById('barreProgression');
    const toutSupprimer = document.getElementById('toutSupprimer');
    const btnExporter = document.getElementById('btnExporter');
    const boutonsFiltres = document.querySelectorAll('.btn-filtre');

    function sauvegarderTaches() {
      const taches = [];
      listeTaches.querySelectorAll('li').forEach(li => {
        taches.push({
          texte: li.querySelector('.tache-texte').textContent,
          categorie: li.querySelector('.tache-categorie').textContent.toLowerCase(),
          date: li.querySelector('.tache-date').textContent,
          finie: li.classList.contains('finie')
        });
      });
      localStorage.setItem('djp_taches', JSON.stringify(taches));
    }

    function chargerTaches() {
      const tachesStockees = localStorage.getItem('djp_taches');
      if (!tachesStockees) return;

      const taches = JSON.parse(tachesStockees);
      taches.forEach(tache => {
        creerElementTache(tache.texte, tache.categorie, tache.date, tache.finie);
      });
      majProgression();
    }

    function majProgression() {
      const total = listeTaches.children.length;
      const finies = listeTaches.querySelectorAll('.finie').length;
      const pourcentage = total === 0 ? 0 : (finies / total) * 100;
      barreProgression.style.width = pourcentage + '%';
    }

    function creerElementTache(texte, cat, dateVal, estFinie = false) {
      const li = document.createElement('li');
      li.className = `cat-${cat}`;
      if (estFinie) li.classList.add('finie');
      
      li.innerHTML = `
        <div class="tache-info">
          <span class="tache-categorie">${cat}</span>
          <span class="tache-texte">${texte}</span>
          <span class="tache-date">${dateVal}</span>
        </div>
        <button class="btn-supprimer">Supprimer</button>
      `;

      li.querySelector('.tache-info').addEventListener('click', () => {
        li.classList.toggle('finie');
        majProgression();
        sauvegarderTaches();
      });

      li.querySelector('.btn-supprimer').addEventListener('click', (e) => {
        e.stopPropagation();
        li.remove();
        majProgression();
        sauvegarderTaches();
      });

      listeTaches.appendChild(li);
    }

    btnAjouter.addEventListener('click', () => {
      const texte = champTache.value.trim();
      const cat = categorieTache.value;
      const dateVal = dateTache.value ? `📅 ${dateTache.value}` : '📅 Pas de date';

      if (!texte) return alert('Veuillez renseigner le libellé de votre tâche.');

      creerElementTache(texte, cat, dateVal);
      champTache.value = '';
      
      majProgression();
      sauvegarderTaches();
      document.querySelector('.btn-filtre[data-filtre="toutes"]').click();
    });

    toutSupprimer.addEventListener('click', () => {
      listeTaches.innerHTML = '';
      majProgression();
      localStorage.removeItem('djp_taches');
    });

    boutonsFiltres.forEach(btn => {
      btn.addEventListener('click', () => {
        boutonsFiltres.forEach(b => b.classList.remove('actif'));
        btn.classList.add('actif');
        
        const filtre = btn.getAttribute('data-filtre');
        listeTaches.querySelectorAll('li').forEach(li => {
          const catTache = li.className.replace('cat-', '').replace(' finie', '').trim();
          if (filtre === 'toutes' || catTache === filtre) {
            li.style.setProperty('display', 'flex', 'important');
          } else {
            li.style.setProperty('display', 'none', 'important');
          }
        });
      });
    });

    btnExporter.addEventListener('click', () => {
      const tachesStockees = localStorage.getItem('djp_taches') || '[]';
      const blob = new Blob([tachesStockees], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'mes_taches_djp.json';
      a.click();
      URL.revokeObjectURL(url);
    });

    chargerTaches();
  </script>
</body>
</html>
